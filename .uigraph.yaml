service:
  name: mytokens
  description: CLI tool to track token usage across AI coding assistants
  repository:
    url: https://github.com/NazmusSayad/mytokens
    provider: github

databases:
  - name: parser-data
    dialect: sqlite
    description: SQLite database for parser data stores
    schemaPath: db/parsers-sqlite.sql
  - name: parser-nosql
    dialect: mongodb
    description: NoSQL schema for parsers using MongoDB-style documents
    schemaPath: db/parsers-mongodb.json
  - name: cache
    dialect: mongodb
    description: Cached API responses for Open Router and Models.dev
    schemaPath: db/cache.json

openapi:
  - name: openrouter
    description: Open Router models API
    specPath: openapi/openrouter.yaml
  - name: models-dev
    description: Models.dev API for AI model pricing
    specPath: openapi/models-dev.yaml

architecture:
  - name: cli-structure
    description: CLI argument and option structure
    diagramPath: diagrams/cli-structure/cli-structure.mmd
    contextPath: diagrams/cli-structure/context.json